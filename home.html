<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
<header>
    <!-- Logo -->
   <div class="left">
    <img id="logo" src="images/logo1.png" height="100" alt="UsefullWebsites.com">
   </div>
<!-- Search area -->
    <div class="center">
        <div class="search-container">
        <input class="input" type="text" placeholder="search...">
            <svg viewBox="0 0 24 24" class="search_icon">
                <g>
                    <path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                    </path>
                </g>
            </svg>
        </div>

        <button class="menu" onclick="openMenu()">⋮</button>
    </div>
    <!-- Signin/Login -->
    <div class="right">
        <button class="login"><b>Sign In</b></button>
    </div>
</header>

<!-- multiple section selection area -->
<nav class="topnav">
    <a href="#" title="Website1">WEBSITE1</a>
    <a href="#" title="Website2">WEBSITE2</a>
    <a href="#" title="Website3">WEBSITE3</a>
</nav> 
<!-- menu overlay area -->
<section class="menu-overlay" id="menu">
    <div class="menu-header">
        <h2>Menu</h2>
        <div class="menu-buttons">
            <label class="switch">
                <input type="checkbox" id="checkbox" onchange="toggleDarkmode()">
                <span class="slider">
                    <div class="star star_1"></div>
                    <div class="star star_2"></div>
                    <div class="star star_3"></div>
                    <svg viewBox="0 0 16 16" class="cloud_1 cloud">
                        <path transform="matrix(.77976 0 0 .78395-299.99-418.63)" fill="#fff"
                        d="m391.84 540.91c-.421-.329-.949-.524-1.523-.524-1.351 0-2.451 1.084-2.485 2.435-1.395.526-2.388 1.88-2.388 3.466 0 1.874 1.385 3.423 3.182 3.667v.034h12.73v-.006c1.775-.104 3.182-1.584 3.182-3.395 0-1.747-1.309-3.186-2.994-3.379.007-.106.011-.214.011-.322 0-2.707-2.271-4.901-5.072-4.901-2.073 0-3.856 1.202-4.643 2.925">
                        </path>
                    </svg>
                </span>
            </label>
            <button class="menu" onclick="closeMenu()">✕</button>
        </div>
    </div>
    <div class="menu-grid">
        <div class="card" title="Contribution">
            <h3>Contribution</h3>
            <p>If you have any usefull website that can help others feel free to tell us we will add it.</p>
        </div>
        <div class="card" title="Feedback">
            <h3>Feedback</h3>
            <p>Give your valuable insights</p>
        </div>
    </div>
</section>


<!-- JS connected -->
<script src="home.js"></script>
</body>
</html>
